name: Bug report
description: Report incorrect CLI behavior, packet handling, or response parsing.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove private IP addresses, hostnames, and packet data that identifies production environments.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Exact command or Python API call.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: packets
    attributes:
      label: Packet output
      description: Include `--verbose` output if useful. Redact private details.
      render: text
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.4"
  - type: input
    id: version
    attributes:
      label: philips-sicp-client version or commit
      description: Run `sicp --version`, or provide the commit hash.
  - type: input
    id: display_model
    attributes:
      label: Display model
  - type: input
    id: firmware
    attributes:
      label: Firmware version
  - type: textarea
    id: extra
    attributes:
      label: Additional context
