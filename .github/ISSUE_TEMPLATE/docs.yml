name: Documentation issue
description: Report unclear, stale, or missing documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link or path to the relevant README/docs section.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: What is unclear, incorrect, or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
